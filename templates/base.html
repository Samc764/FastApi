<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Máquina Mágica{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" type="image/x-icon" href="https://i.pinimg.com/736x/c9/4f/3d/c94f3d700a30559fbad9f10974387b11.jpg">
</head>
<body>
    <header class="navbar-magica">
        <div class="container">
            <a class="nav-brand" href="/">🔮 Máquina Mágica</a>
            <nav class="nav-links">
                <a href="/">Inicio</a>
                <a href="/historial">Historial</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block contenido %}{% endblock %}
    </main>

    <footer class="footer-magica">
        <p>Hecho con <span>💜</span> — {{ ano_actual }}</p>
    </footer>
</body>
</html>
